# =====================================================
# docker-compose.yml - 仓库管理系统
# =====================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse_web
    network_mode: bridge
    ports:
      - "8081:8080"
    environment:
      - CATALINA_OPTS=-Djava.awt.headless=true
    restart: unless-stopped