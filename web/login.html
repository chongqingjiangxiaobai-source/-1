<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仓库管理系统 - 登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="m3-liquid-body">

  <div class="liquid-canvas">
    <div class="blob blob-google-blue"></div>
    <div class="blob blob-google-red"></div>
    <div class="blob blob-google-yellow"></div>
    <div class="blob blob-google-green"></div>
  </div>

  <div class="page-transition-wrapper" id="pageWrapper">
    <div class="glass-login-card">

      <div class="brand-area">
        <div class="m3-logo-glow">
          <span class="material-icons-outlined logo-icon">inventory_2</span>
        </div>
        <h2>仓库管理系统</h2>
        <p>WAREHOUSE MANAGEMENT SYSTEM</p>
      </div>

      <form onsubmit="return false;">
        <div class="m3-field-group">
          <span class="material-icons-outlined field-icon">account_circle</span>
          <input type="text" name="username" id="username" required placeholder=" " autocomplete="off" class="glass-input" />
          <label for="username">请输入系统账号</label>
        </div>

        <div class="m3-field-group">
          <span class="material-icons-outlined field-icon">lock</span>
          <input type="password" name="password" id="password" required placeholder=" " class="glass-input" />
          <label for="password">请输入安全密码</label>
        </div>

        <div class="error-tip-container">
          <span id="err-login"></span>
        </div>

        <button class="btn-m3-glass" type="button" onclick="mylogin()" id="loginBtn">
          <span class="btn-text">登 录</span>
          <div class="btn-shine"></div>
        </button>
      </form>

      <div class="m3-action-links">
        <a href="javascript:void(0)" class="glass-link">忘记密码</a>
        <a href="javascript:void(0)" onclick="smoothNavigate('reg.html')" class="glass-link highlight">注册新账号</a>
      </div>

      <p class="m3-copyright">© 2026 枣庄学院 · 仓储物联中心</p>
    </div>
  </div>

  <script src="js/xhr.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
