<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>仓库管理系统 - 登录</title>
  <link rel="stylesheet" href="css/global.css" />
</head>
<body class="glass-body">
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <rect width="52" height="52" rx="14" fill="url(#lg)"/>
          <path d="M14 30L20 24L26 30L38 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 38H38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <defs><linearGradient id="lg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient></defs>
        </svg>
        <h2>仓库管理系统</h2>
        <p>WAREHOUSE MANAGEMENT</p>
      </div>
      <form onsubmit="return false;">
        <div class="form-item">
          <span class="icon-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" name="username" class="input-txt" placeholder="输入账号" id="username" autocomplete="off" />
        </div>
        <div class="form-item">
          <span class="icon-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" name="password" class="input-txt" placeholder="输入密码" id="password" />
        </div>
        <span id="err-login"></span>
        <button class="btn-login" type="button" onclick="mylogin()">登 录</button>
      </form>
      <div class="account-link">
        <a href="#">忘记密码</a>
        <a href="reg.html">注册账号</a>
      </div>
      <p class="copyright">© 2026 枣庄学院 仓库管理系统</p>
    </div>
  </div>
  <script src="js/xhr.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
