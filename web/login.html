<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>仓库管理系统 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #060c14; }
    #three-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }
  </style>
</head>
<body>

<canvas id="three-bg"></canvas>

<div class="login-wrapper" style="position:relative;z-index:10;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
  <div class="login-card">
    <div class="logo-area">
      <img src="img/location.png" alt="logo" />
      <h2>仓库管理系统</h2>
      <p>枣庄学院</p>
    </div>

    <form onsubmit="return false;">
      <div class="form-item">
        <span class="icon">👤</span>
        <input type="text" name="username" class="input-txt" placeholder="请输入账号" id="username" />
      </div>
      <div class="form-item">
        <span class="icon">🔒</span>
        <input type="password" name="password" class="input-txt" placeholder="请输入密码" id="password" />
      </div>
      <span id="err-login"></span>
      <button class="btn-login" type="button" onclick="mylogin()">登 录</button>
    </form>

    <div class="account-link">
      <a href="#">忘记密码</a>
      <a href="reg.html">注册账号</a>
    </div>
    <p class="copyright">© 2026 枣庄学院 Warehouse Management System</p>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  var canvas = document.getElementById('three-bg');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  var scene = new THREE.Scene();

  var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 18);

  // OrbitControls (optional mouse drag)
  var controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.6;

  // ---- 灯光 ----
  var ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  var dirLight = new THREE.DirectionalLight(0x0CE093, 0.8);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  var pointLight = new THREE.PointLight(0x3b82f6, 0.5, 50);
  pointLight.position.set(-8, 5, 5);
  scene.add(pointLight);

  // ---- 材质 ----
  var glassMat = new THREE.MeshPhysicalMaterial({
    color: 0x0CE093,
    metalness: 0.0,
    roughness: 0.1,
    transparent: true,
    opacity: 0.15,
    transmission: 0.6,
    thickness: 1.5,
    envMapIntensity: 1.0,
    side: THREE.DoubleSide,
  });

  var edgeMat = new THREE.LineBasicMaterial({
    color: 0x0CE093,
    transparent: true,
    opacity: 0.5,
  });

  // ---- 3D 货物箱 ----
  var boxGeo = new THREE.BoxGeometry(3, 2, 2);
  var boxes = [];

  for (var i = 0; i < 7; i++) {
    var mat = glassMat.clone();
    mat.opacity = 0.08 + Math.random() * 0.08;
    var mesh = new THREE.Mesh(boxGeo, mat);
    var edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(boxGeo),
      edgeMat.clone()
    );

    var group = new THREE.Group();
    group.add(mesh);
    group.add(edges);

    var spread = 12;
    group.position.set(
      (Math.random() - 0.5) * spread,
      (Math.random() - 0.5) * spread * 0.6,
      (Math.random() - 0.5) * spread
    );
    group.rotation.set(
      Math.random() * Math.PI,
      Math.random() * Math.PI,
      Math.random() * Math.PI
    );
    group.userData = {
      rotSpeed: {
        x: (Math.random() - 0.5) * 0.008,
        y: (Math.random() - 0.5) * 0.008,
        z: (Math.random() - 0.5) * 0.005,
      },
      floatSpeed: 0.003 + Math.random() * 0.004,
      floatPhase: Math.random() * Math.PI * 2,
      baseY: group.position.y,
    };
    scene.add(group);
    boxes.push(group);
  }

  // ---- 发光球 ----
  var sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
  var sphereMat = new THREE.MeshBasicMaterial({ color: 0x0CE093, transparent: true, opacity: 0.8 });
  for (var j = 0; j < 30; j++) {
    var sphere = new THREE.Mesh(sphereGeo, sphereMat.clone());
    sphere.position.set(
      (Math.random() - 0.5) * 25,
      (Math.random() - 0.5) * 15,
      (Math.random() - 0.5) * 20
    );
    sphere.userData = {
      speed: 0.02 + Math.random() * 0.04,
      radius: 3 + Math.random() * 8,
      angle: Math.random() * Math.PI * 2,
      height: (Math.random() - 0.5) * 8,
    };
    scene.add(sphere);
    boxes.push(sphere);
  }

  // ---- 水平面网格 ----
  var gridHelper = new THREE.GridHelper(40, 20, 0x0CE093, 0x0a3a2a);
  gridHelper.position.y = -8;
  gridHelper.material.opacity = 0.12;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // ---- 动画 ----
  var clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    var t = clock.getElapsedTime();

    boxes.forEach(function(obj) {
      var ud = obj.userData;
      if (obj.isGroup) {
        obj.rotation.x += ud.rotSpeed.x;
        obj.rotation.y += ud.rotSpeed.y;
        obj.rotation.z += ud.rotSpeed.z;
        obj.position.y = ud.baseY + Math.sin(t * ud.floatSpeed * 2 + ud.floatPhase) * 0.8;
      } else {
        ud.angle += ud.speed * 0.01;
        obj.position.x = Math.cos(ud.angle) * ud.radius;
        obj.position.z = Math.sin(ud.angle) * ud.radius;
        obj.position.y = ud.height + Math.sin(t * 0.5 + ud.angle) * 0.5;
      }
    });

    controls.update();
    renderer.render(scene, camera);
  }

  animate();

  // ---- resize ----
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>

<!-- 登录逻辑 -->
<link rel="stylesheet" href="css/global.css" />
<link rel="stylesheet" href="css/login.css" />
<script src="js/xhr.js"></script>
<script src="js/login.js"></script>
</body>
</html>
