<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员注册 - 仓库管理系统</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="m3-liquid-body">

  <div class="liquid-canvas">
    <div class="blob blob-google-blue"></div>
    <div class="blob blob-google-red"></div>
    <div class="blob blob-google-yellow"></div>
    <div class="blob blob-google-green"></div>
  </div>

  <div class="page-transition-wrapper" id="pageWrapper">
    <div class="glass-login-card">

      <div class="brand-area">
        <div class="m3-logo-glow">
          <span class="material-icons-outlined logo-icon">person_add</span>
        </div>
        <h2>创建管理员账号</h2>
        <p>WAREHOUSE MANAGEMENT SYSTEM</p>
      </div>

      <form id="regForm" action="registerServlet" method="POST">

        <div class="reg-field-container">
          <div class="m3-field-group">
            <span class="material-icons-outlined field-icon">account_circle</span>
            <input type="text" name="username" id="username" required placeholder=" " autocomplete="off" class="glass-input" />
            <label for="username">用户名 (3-8位字母开头)</label>
          </div>
          <span id="err-username" class="err-tip"></span>
        </div>

        <div class="reg-field-container">
          <div class="m3-field-group">
            <span class="material-icons-outlined field-icon">lock</span>
            <input type="password" name="password" required placeholder=" " class="glass-input" />
            <label for="password">初始密码 (6-18位)</label>
          </div>
          <span id="err-pwd" class="err-tip"></span>
        </div>

        <div class="reg-field-container">
          <div class="m3-field-group">
            <span class="material-icons-outlined field-icon">gpp_good</span>
            <input type="password" name="repassword" id="repassword" required placeholder=" " class="glass-input" />
            <label for="repassword">请再次输入密码以确认</label>
          </div>
          <span id="err-repwd" class="err-tip"></span>
        </div>

        <button type="submit" class="btn-m3-glass">
          <span class="btn-text">立即注册</span>
          <div class="btn-shine"></div>
        </button>
      </form>

      <div class="m3-action-links" style="justify-content: center;">
        <a href="javascript:void(0)" onclick="window.location.href='login.html'" class="glass-link">← 返回系统登录</a>
      </div>

      <p class="m3-copyright">© 2026 枣庄学院 · 仓储物联中心</p>
    </div>
  </div>

  <script src="js/xhr.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
