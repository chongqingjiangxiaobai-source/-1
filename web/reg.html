<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理员注册</title>
  <link rel="stylesheet" href="css/global.css" />
  <script src="js/xhr.js"></script>
  <script src="js/register.js"></script>
</head>
<body class="glass-body">
  <div class="reg-wrapper">
    <div class="reg-card">
      <svg width="44" height="44" viewBox="0 0 52 52" fill="none" style="display:block;margin:0 auto 14px;">
        <rect width="52" height="52" rx="14" fill="url(#rg)"/>
        <path d="M14 30L20 24L26 30L38 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 38H38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#1d4ed8"/></linearGradient></defs>
      </svg>
      <h2>仓库管理系统</h2>
      <p class="reg-subtitle">WAREHOUSE MANAGEMENT</p>
      <form id="regForm" action="registerServlet" method="POST">
        <div class="form-item">
          <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input type="text" name="username" class="input-txt" placeholder="用户名 (3-8位字母开头)" id="username" />
          <span id="err-username" class="err-tip"></span>
        </div>
        <div class="form-item">
          <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" name="password" class="input-txt" placeholder="密码 (6-18位)" />
          <span id="err-pwd" class="err-tip"></span>
        </div>
        <div class="form-item">
          <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" name="repassword" id="repassword" class="input-txt" placeholder="确认密码" />
          <span id="err-repwd" class="err-tip"></span>
        </div>
        <button type="submit" class="btn-reg">注 册</button>
      </form>
      <div class="back-link"><a href="login.html">← 返回登录</a></div>
      <p class="copyright">© 2026 枣庄学院 仓库管理系统</p>
    </div>
  </div>
</body>
</html>
