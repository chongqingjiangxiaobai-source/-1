<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理员注册</title>
    <link rel="stylesheet" href="css/reg.css" />
    <link rel="stylesheet" href="css/animate.css" />
    <script src="js/xhr.js"></script>
    <script src="js/register.js"></script>
</head>
<body>
    <div class="wrap animated bounceInRight">
        <h1>仓库管理系统</h1>
        <div class="reg">
            <h3>管理员注册</h3>
            <div class="title-line"></div>
            <div class="reg-form">
                <form id="regForm" action="registerServlet" method="POST">
                    <div class="input-gorup">
                        <span class="icon icon-user"></span>
                        <input type="text" name="username" class="input-txt" placeholder="请输入用户名(3-8位字母开头)" id="username" />
                        <span id="err-username"></span>
                    </div>
                    <div class="input-gorup">
                        <span class="icon icon-pwd"></span>
                        <input type="password" name="password" class="input-txt" placeholder="请输入密码(6-18位)" />
                        <span id="err-pwd"></span>
                    </div>
                    <div class="input-gorup">
                        <span class="icon icon-pwd"></span>
                        <input type="password" name="repassword" id="repassword" class="input-txt" placeholder="请确认密码" />
                        <span id="err-repwd"></span>
                    </div>
                    <button type="submit" class="btn-reg">添加帐号</button>
                </form>
                <div class="account-link">
                    <a href="login.html">返回</a>
                </div>
                <p class="copyright">&copy;By 枣庄学院</p>
            </div>
        </div>
    </div>
</body>
</html>
