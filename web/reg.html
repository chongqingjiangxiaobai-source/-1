<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理员注册</title>
  <link rel="stylesheet" href="css/global.css" />
  <script src="js/xhr.js"></script>
  <script src="js/register.js"></script>
</head>
<body class="glass-body">
  <div class="reg-wrapper">
    <div class="reg-card">
      <h2>📦 仓库管理系统</h2>
      <p class="reg-subtitle">枣庄学院</p>
      <form id="regForm" action="registerServlet" method="POST">
        <div class="form-item">
          <span class="icon">👤</span>
          <input type="text" name="username" class="input-txt" placeholder="用户名 (3-8位字母开头)" id="username" />
          <span id="err-username" class="err-tip"></span>
        </div>
        <div class="form-item">
          <span class="icon">🔒</span>
          <input type="password" name="password" class="input-txt" placeholder="密码 (6-18位)" />
          <span id="err-pwd" class="err-tip"></span>
        </div>
        <div class="form-item">
          <span class="icon">🔒</span>
          <input type="password" name="repassword" id="repassword" class="input-txt" placeholder="确认密码" />
          <span id="err-repwd" class="err-tip"></span>
        </div>
        <button type="submit" class="btn-reg">注 册</button>
      </form>
      <div class="back-link">
        <a href="login.html">← 返回登录</a>
      </div>
      <p class="copyright">© 2026 枣庄学院 Warehouse Management System</p>
    </div>
  </div>
</body>
</html>
